<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="description" content="Formation urgentiste — Application mobile Étoile Bleue Urgence" />
    <title>Formation — Étoile Bleue Urgence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="Aperçu des slides">
        <header class="sidebar__header">
          <div class="brand">
            <span class="brand__icon" aria-hidden="true">+</span>
            <div>
              <strong class="brand__title">Étoile Bleue</strong>
              <span class="brand__subtitle">Formation urgentiste</span>
            </div>
          </div>
          <button
            type="button"
            class="icon-btn sidebar__collapse"
            id="btn-toggle-sidebar"
            aria-label="Masquer l'aperçu"
            aria-pressed="false"
            title="Masquer l'aperçu (B)"
          >
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M15 18l-6-6 6-6" />
            </svg>
          </button>
        </header>
        <nav class="thumbnails" id="thumbnails" aria-label="Navigation par slide"></nav>
      </aside>

      <div class="main-column">
        <header class="topbar">
          <button
            type="button"
            class="icon-btn topbar__menu"
            id="btn-open-sidebar"
            aria-label="Afficher l'aperçu"
            hidden
          >
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
          <div class="topbar__info">
            <span class="topbar__label" id="current-slide-title">Introduction</span>
            <span class="topbar__counter" id="slide-counter">1 / 30</span>
          </div>
          <div class="topbar__actions">
            <button type="button" class="toolbar-btn" id="btn-notes" aria-pressed="false" title="Notes formateur (N)">
              Notes
            </button>
            <button type="button" class="toolbar-btn" id="btn-fullscreen" aria-pressed="false" title="Plein écran (F)">
              Plein écran
            </button>
          </div>
        </header>

        <main class="stage" aria-label="Slide active">
          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" id="progress-bar"></div>
          </div>

          <div
            class="slide-stage"
            id="slide-stage"
            tabindex="0"
            aria-live="polite"
            aria-atomic="true"
          ></div>

          <footer class="stage-footer">
            <button type="button" class="nav-btn" id="btn-prev" aria-label="Slide précédente">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                <path d="M18 15l-6-6-6 6" />
              </svg>
              <span>Précédent</span>
            </button>

            <p class="keyboard-hints" aria-hidden="true">
              <kbd>↑</kbd><kbd>↓</kbd> naviguer · <kbd>N</kbd> notes · <kbd>F</kbd> plein écran
            </p>

            <button type="button" class="nav-btn nav-btn--primary" id="btn-next" aria-label="Slide suivante">
              <span>Suivant</span>
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                <path d="M6 9l6 6 6-6" />
              </svg>
            </button>
          </footer>
        </main>
      </div>

      <aside class="notes-panel" id="notes-panel" aria-label="Notes du formateur">
        <header class="notes-panel__header">
          <h2>Notes formateur</h2>
          <p>Visible uniquement pour vous pendant la présentation.</p>
        </header>
        <div class="notes-panel__body" id="notes-content"></div>
      </aside>
    </div>

    <script src="js/slides.js"></script>
    <script src="js/render.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
